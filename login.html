<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header">
    <img src="Screenshot 2026-04-16 094450.png" class="logo">
    <h1>L.D. College of Engineering</h1>
</div>
<div class="login-box">
    <h2>🔐 Login</h2>
    <input type="text" id="loginUser" placeholder="Enter Username"><br>
    <input type="password" id="loginPass" placeholder="Enter Password"><br>
    <button onclick="login()">Login</button>
    <p id="msg"></p>
</div>
<script>
function login() {
    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;
    if (user === "pradip" && pass === "1234") {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "index.html";
    } else {
        document.getElementById("msg").textContent = "Invalid Username or Password!";
    }
}
</script>
</body>
</html>
